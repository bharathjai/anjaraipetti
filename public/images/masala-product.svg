<svg width="1200" height="1500" viewBox="0 0 1200 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E1A0F"/>
      <stop offset="52%" stop-color="#6C3C1D"/>
      <stop offset="100%" stop-color="#B9682D"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 680) rotate(90) scale(560 520)">
      <stop stop-color="#FFD4A5" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#FFD4A5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8EFE3"/>
      <stop offset="100%" stop-color="#E8D5BF"/>
    </linearGradient>
    <linearGradient id="label" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8F4A22"/>
      <stop offset="100%" stop-color="#5E2C13"/>
    </linearGradient>
    <filter id="shadow" x="235" y="270" width="730" height="1030" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="36" stdDeviation="28" flood-color="#2D170D" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="1500" fill="url(#bg)"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>

  <g opacity="0.2">
    <circle cx="160" cy="210" r="34" fill="#F1B36F"/>
    <circle cx="1040" cy="260" r="26" fill="#F1B36F"/>
    <circle cx="230" cy="1330" r="22" fill="#F1B36F"/>
    <circle cx="980" cy="1270" r="30" fill="#F1B36F"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="330" width="600" height="900" rx="36" fill="url(#pack)"/>
  </g>

  <rect x="340" y="390" width="520" height="120" rx="24" fill="#EFE0CC"/>
  <text x="600" y="450" text-anchor="middle" fill="#4E2918" font-size="48" font-family="Georgia, serif" font-weight="700" letter-spacing="2">
    ANJARAIPETTI
  </text>

  <rect x="370" y="560" width="460" height="320" rx="30" fill="url(#label)"/>
  <text x="600" y="650" text-anchor="middle" fill="#F6E2C8" font-size="58" font-family="Georgia, serif" font-weight="700">
    BIRYANI
  </text>
  <text x="600" y="718" text-anchor="middle" fill="#F6E2C8" font-size="58" font-family="Georgia, serif" font-weight="700">
    MASALA
  </text>
  <text x="600" y="790" text-anchor="middle" fill="#D8B18A" font-size="24" font-family="Arial, sans-serif" letter-spacing="5">
    AUTHENTIC TAMIL FLAVOR
  </text>

  <ellipse cx="600" cy="1010" rx="175" ry="80" fill="#CF7B33"/>
  <ellipse cx="600" cy="1000" rx="162" ry="68" fill="#E19B50"/>
  <ellipse cx="600" cy="990" rx="145" ry="54" fill="#A54D20"/>
  <ellipse cx="600" cy="982" rx="120" ry="36" fill="#C95C22"/>

  <text x="600" y="1120" text-anchor="middle" fill="#6A3A1E" font-size="28" font-family="Arial, sans-serif" font-weight="700">
    120 g | SMALL BATCH
  </text>
</svg>
